#cloud-config
autoinstall:
  version: 1
  source:
    id: ubuntu-desktop-minimal


  refresh-installer:
    update: false

  identity:
    hostname: D3001
    username: david
    # Sicheres temporäres Passwort setzen! Ersetzen mit eigenem Hash:
    # mkpasswd -m yescrypt
    password: '$y$j9T$j4WYEgFLBM3I6D5ed3mfY1$bm.j545L5vdmqW1g3cmsXy3UvNmjmYSVBM3P0zE.Sz8' # 1234

  locale: de_DE.UTF-8
  keyboard:
    layout: de
  timezone: Europe/Berlin

  ssh:
    install-server: false
    allow-pw: true

  apt:
    preserve_sources_list: false
    disable_components: []
    geoip: false
    fallback: offline-install
  packages: []

  storage:
    config:
      - type: disk
        id: disk0
        match:
          size: largest
        ptable: gpt
        grub_device: true
      - type: partition
        id: efi-partition
        device: disk0
        size: 1G
        flag: esp
        grub_device: true
        preserve: false
      - type: partition
        id: boot-partition
        device: disk0
        size: 1G
        preserve: false
        wipe: superblock
      - type: partition
        id: lvm-pv-partition
        device: disk0
        size: -1
        preserve: false
        wipe: superblock
      - type: lvm_volgroup
        id: ubuntu-vg
        name: ubuntu-vg
        devices:
          - lvm-pv-partition
      - type: lvm_partition
        id: root-lv
        name: root
        volgroup: ubuntu-vg
        size: -1
      - type: format
        id: boot-fs
        volume: boot-partition
        fstype: ext4
      - type: format
        id: root-fs
        volume: root-lv
        fstype: ext4
      - type: format
        id: efi-fs
        volume: efi-partition
        fstype: fat32
      - type: mount
        id: boot-mount
        device: boot-fs
        path: /boot
      - type: mount
        id: root-mount
        device: root-fs
        path: /
      - type: mount
        id: efi-mount
        device: efi-fs
        path: /boot/efi
    bootloader:
      search:
        device: disk0

  network:
    version: 2
    ethernets: {}

  early-commands:
    - rm -f /run/kernel-meta-package
    - touch /run/kernel-meta-package
    - |
      bash -c '
      cat << "FAKE" > /tmp/fake-apt-get
      #!/bin/bash
      if [[ "$*" == *"--download-only"* && "$*" == *"install"* ]]; then
          echo "Offline-Installation: --download-only abgefangen für: $*" >&2
          exit 0
      fi
      if [[ "$*" == *"linux-generic"* ]]; then
          echo "linux-generic wird später installiert (Post-Install)" >&2
          exit 0
      fi
      exec /usr/bin/apt-get "$@"
      FAKE
      chmod +x /tmp/fake-apt-get
      (
        while [ ! -d /target/usr/local/sbin ]; do
          sleep 0.5
        done
        cp /tmp/fake-apt-get /target/usr/local/sbin/apt-get
        chmod +x /target/usr/local/sbin/apt-get
      ) &
      '


  late-commands:
    # Kdump blocken
    - |
      curtin in-target -- bash -c 'cat > /etc/apt/preferences.d/block-kdump << "EOF"
      Package: kdump-tools
      Pin: version *
      Pin-Priority: -1
      EOF
      '

    # 1. Sprache und Tastatur finalisieren
    - |
      curtin in-target -- bash -c '
      locale-gen de_DE.UTF-8
      update-locale LANG=de_DE.UTF-8 LANGUAGE="de_DE:de" LC_ALL=de_DE.UTF-8
      sed -i "s/XKBLAYOUT=.*/XKBLAYOUT=\"de\"/" /etc/default/keyboard
      setupcon 2>/dev/null || true
      '
    
    # 2. GRUB: Split-Lock-Detect deaktivieren
    - curtin in-target -- sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT="\(.*\)"/GRUB_CMDLINE_LINUX_DEFAULT="split_lock_detect=off \1"/' /etc/default/grub
    - curtin in-target -- update-grub
    
    # 3. Initramfs aktualisieren
    - curtin in-target -- update-initramfs -u
    
    # 4. Passwortänderung erzwingen
    - curtin in-target -- chage -d 0 david
    
    # 5. APT-Cache bereinigen
    - curtin in-target -- apt-get clean
    
    # 6. Postinstall-Skript ablegen (Base64-kodiert)
    - |
      curtin in-target -- bash -c 'echo "" | base64 -d > /home/david/install-software.sh && chmod +x /home/david/install-software.sh && chown 1000:1000 /home/david/install-software.sh'
    

    # 7. Bash-Alias und Terminal-Banner
    - |
      curtin in-target -- bash -c '
      cat >> /home/david/.bashrc << '"'"'EOF'"'"'

      alias run="sudo bash /home/david/install-software.sh"
      if [ ! -f /home/david/.setup-notified ]; then
          echo ""
          echo "╔════════════════════════════════════════════╗"
          echo "║     Software-Installation verfuegbar        ║"
          echo "╠════════════════════════════════════════════╣"
          echo "║  Zum Starten der Installation ausfuehren:  ║"
          echo "║            run                             ║"
          echo "╚════════════════════════════════════════════╝"
          echo ""
          touch /home/david/.setup-notified
      fi
      EOF
      chown 1000:1000 /home/david/.bashrc
      chown 1000:1000 /home/david/.setup-notified 2>/dev/null || true
      '
    # 8. Desktop-Notiz und leere Statusdatei
    - |
      curtin in-target -- bash -c '
      mkdir -p /home/david/Desktop
      cat > /home/david/Desktop/README-INSTALLATION.txt << '"'"'EOF'"'"'
      ╔════════════════════════════════════════════════════════════════╗
      ║        SOFTWARE-INSTALLATION FUER D3001                        ║
      ╠════════════════════════════════════════════════════════════════╣
      ║  SCHRITT 1: Terminal oeffnen (Ctrl+Alt+T)                     ║
      ║  SCHRITT 2: Befehl 'run' eingeben                             ║
      ║  Passwort aendern: passwd                                     ║
      ╚════════════════════════════════════════════════════════════════╝
      EOF
      touch /home/david/INSTALL-STATUS.txt
      chown -R 1000:1000 /home/david/Desktop /home/david/INSTALL-STATUS.txt
      '
   
    # 9. Aufräumen: Wrapper löschen (Original bleibt erhalten)
    - curtin in-target -- rm -f /usr/local/sbin/apt-get
   